<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Rock Paper Scissors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
  </head>
  <body>
    <header class="header">
      <h1 class="title">ROCK PAPER SCISSORS</h1>
    </header>
    <main class="main">
      <section class="score-display-section">
        <p class="score-header">Score</p>
        <div class="score-container">
        <div class="score-box">
        <p>Player</p>
        <p class="player-score">0</p>
        </div>
        <div class="score-box">
        <p>Computer</p>
        <p class="computer-score">0</p>
        </div>
        </div>
        <div>
          <p class="winner-text"></p>
        </div>
      </section>
      <section class="buttons">
        <button id="Rock">
          <img src="Images/rock.png" alt="Rock Icon" draggable="false" />
        </button>
        <button id="Paper">
          <img src="Images/paper.png" alt="Paper Icon" draggable="false" />
        </button>
        <button id="Scissors">
          <img
            src="Images/scissors.png"
            alt="Scissors Icon"
            draggable="false"
          />
        </button>
      </section>
    </main>
    <footer class="footer">
      Copyright © <script>document.write(new Date().getFullYear());</script> Boredest
    </footer>
    <script src="app.js"></script>
  </body>
</html>
